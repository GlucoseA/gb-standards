services:
  gb-standards:
    build: .
    container_name: gb-standards
    ports:
      - "8000:8000"
    volumes:
      - gb-data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      - DATA_DIR=/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/stats')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  gb-data:
